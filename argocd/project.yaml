apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cicd-test
  namespace: argocd
spec:
  description: Project for Minikube local GitOps
  sourceRepos:
    - 'https://github.com/Hymeno-Ran/k8s-cicd.git'
  destinations:
    - namespace: demo
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'