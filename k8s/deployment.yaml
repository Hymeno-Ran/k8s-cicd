apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: erica37/cicd-k8s:500cca87477742350f1c302b3c4dff2b76026f21
        # imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5