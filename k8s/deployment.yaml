apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: erica37/cicd-k8s:865ca9865d4cfde719550a6468d83b6f2c0ba85a
        # imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5