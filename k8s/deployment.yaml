apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: erica37/cicd-k8s:60722ed7e235214dced99a54d94f614d571f7727
        # imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5